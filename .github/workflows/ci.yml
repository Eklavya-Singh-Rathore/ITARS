name: CI

on:
  push:
    branches: [main]
  pull_request:

# Repo root is the platform — paths below are relative to it.
jobs:
  backend:
    name: Backend tests (py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      # The live-pipeline smoke test needs the model artifacts + network (HF Hub),
      # which aren't in the repo — it runs in the author's ML env. Everything else
      # (unit/integration tests with fakes) runs here.
      - run: pytest -q --ignore=tests/test_pipeline_smoke.py

  frontend:
    name: Frontend lint + build (node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: itars-backend:ci
